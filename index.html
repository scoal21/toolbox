<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HD현대중공업 의장생산 툴박스 네비게이터</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #2c3e50; font-family: 'Malgun Gothic', sans-serif; }
        
        /* 상단 UI 바 */
        #ui-bar { position: absolute; top: 10px; left: 10px; right: 10px; z-index: 1000; display: flex; gap: 10px; }
        #search-box { flex: 1; padding: 12px; border-radius: 8px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3); font-size: 16px; }
        .btn { padding: 12px 15px; border-radius: 8px; border: none; font-weight: bold; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer; color: white; }
        .btn-add { background-color: #27ae60; }
        .btn-lock { background-color: #e74c3c; }
        .btn-lock.unlocked { background-color: #f39c12; }

        /* 야드 맵 컨테이너 */
        #map-container { position: relative; width: 100vw; height: 100vh; overflow: auto; cursor: grab; }
        #yard-map { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
        
        /* 툴박스 마커 */
        .marker { position: absolute; width: 24px; height: 24px; border-radius: 50%; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.5); transform: translate(-50%, -50%); cursor: pointer; transition: transform 0.1s; }
        .marker:active { transform: translate(-50%, -50%) scale(1.2); }
        .marker-label { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; white-space: nowrap; pointer-events: none; }
        .warning-blink { animation: blink 1s infinite alternate; border: 3px solid #ffeb3b; }
        @keyframes blink { from { box-shadow: 0 0 10px red; } to { box-shadow: 0 0 20px red; } }

        /* 팝업 창 (모바일 최적화) */
        #popup { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 20px 20px 0 0; padding: 20px; z-index: 2000; box-shadow: 0 -5px 15px rgba(0,0,0,0.3); max-height: 85vh; overflow-y: auto; }
        .popup-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .popup-header input { font-size: 20px; font-weight: bold; border: none; border-bottom: 2px solid #3498db; width: 70%; padding: 5px; }
        .close-btn { font-size: 24px; background: none; border: none; cursor: pointer; color: #7f8c8d; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: #7f8c8d; margin-bottom: 5px; font-weight: bold; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        
        /* 사진 영역 */
        .photo-area { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .photo-thumb { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); cursor: pointer; border: 1px solid #eee; transition: transform 0.2s; }
        .photo-thumb:active { transform: scale(0.95); }
        
        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save { flex: 2; background-color: #3498db; }
        .btn-delete { flex: 1; background-color: #e74c3c; }

        /* 사진 확대 라이트박스 (모달) */
        #imageModal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); text-align: center; }
        .modal-close { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; font-weight: bold; cursor: pointer; }
        #modalImage { margin-top: 10vh; max-width: 95%; max-height: 80vh; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); object-fit: contain; }
    </style>
</head>
<body>

    <div id="ui-bar">
        <input type="text" id="search-box" placeholder="툴박스 이름 검색..." onkeyup="searchBox()">
        <button class="btn btn-add" onclick="addNewBox()">+ 추가</button>
        <button id="lock-btn" class="btn btn-lock unlocked" onclick="toggleLock()">이동 잠금 OFF</button>
    </div>

    <div id="map-container">
        <img id="yard-map" src="/static/yard_map.jpg" alt="야드 도면" onerror="this.src='https://via.placeholder.com/2000x1500?text=Map+Not+Found';">
        <div id="markers-layer"></div>
    </div>

    <div id="popup">
        <div class="popup-header">
            <input type="text" id="p-name" placeholder="툴박스 이름 (예: TB-101)">
            <button class="close-btn" onclick="closePopup()">✖</button>
        </div>
        
        <div style="display:flex; gap:10px;">
            <div class="form-group" style="flex:1;">
                <label>정담당자</label>
                <input type="text" id="p-manager-main" class="form-control" placeholder="이름">
            </div>
            <div class="form-group" style="flex:1;">
                <label>부담당자</label>
                <input type="text" id="p-manager-sub" class="form-control" placeholder="이름">
            </div>
        </div>

        <div class="form-group">
            <label>특이사항 / 경고 (입력 시 붉은색 점멸)</label>
            <input type="text" id="p-warning" class="form-control" placeholder="예: 케이블 절단 주의">
        </div>

        <div class="form-group">
            <label>색상 분류</label>
            <select id="p-color" class="form-control">
                <option value="#3498db">파란색 (일반 공구)</option>
                <option value="#e74c3c">빨간색 (용접/화기)</option>
                <option value="#f1c40f">노란색 (전기/케이블)</option>
                <option value="#2ecc71">초록색 (기타)</option>
            </select>
        </div>

        <div class="form-group">
            <label>현장 사진 (앨범 또는 카메라)</label>
            <input type="file" id="p-photo-input" accept="image/*" class="form-control" multiple>
            <button onclick="uploadPhoto()" style="width:100%; margin-top:5px; padding:10px; background:#95a5a6; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">사진 업로드 적용</button>
            <div id="p-photo-area" class="photo-area"></div>
        </div>

        <div class="action-btns">
            <button class="btn btn-save" onclick="saveToolbox()">저장하기</button>
            <button class="btn btn-delete" onclick="deleteToolbox()">삭제</button>
        </div>
    </div>

    <div id="imageModal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img id="modalImage">
    </div>

    <script>
        let toolboxes = [];
        let currentBoxId = null;
        let isLocked = false;
        
        // 1. 데이터 불러오기
        async function loadData() {
            try {
                const res = await fetch('/api/toolboxes');
                toolboxes = await res.json();
                renderMap();
            } catch (e) {
                console.error('데이터 로딩 실패:', e);
            }
        }

        // 2. 지도에 마커 그리기
        function renderMap() {
            const layer = document.getElementById('markers-layer');
            layer.innerHTML = '';
            toolboxes.forEach(box => {
                const el = document.createElement('div');
                el.className = 'marker';
                if(box.warning && box.warning.trim() !== '') el.classList.add('warning-blink');
                el.style.backgroundColor = box.color || '#3498db';
                el.style.left = box.lat + 'px';
                el.style.top = box.lng + 'px';
                el.id = 'marker-' + box.id;

                const label = document.createElement('div');
                label.className = 'marker-label';
                label.innerText = box.name;
                el.appendChild(label);

                el.addEventListener('click', (e) => {
                    if(!isDragging) openPopup(box.id);
                });

                setupDraggable(el, box);
                layer.appendChild(el);
            });
        }

        // 3. 드래그 기능 세팅
        let isDragging = false;
        function setupDraggable(el, box) {
            let startX, startY, initialLeft, initialTop;

            const startDrag = (e) => {
                if (isLocked) return;
                isDragging = false;
                e.preventDefault();
                const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                startX = clientX; startY = clientY;
                initialLeft = parseFloat(el.style.left);
                initialTop = parseFloat(el.style.top);
                
                document.addEventListener('mousemove', doDrag);
                document.addEventListener('touchmove', doDrag, {passive: false});
                document.addEventListener('mouseup', stopDrag);
                document.addEventListener('touchend', stopDrag);
            };

            const doDrag = (e) => {
                isDragging = true;
                const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
                const dx = clientX - startX;
                const dy = clientY - startY;
                el.style.left = (initialLeft + dx) + 'px';
                el.style.top = (initialTop + dy) + 'px';
            };

            const stopDrag = async (e) => {
                document.removeEventListener('mousemove', doDrag);
                document.removeEventListener('touchmove', doDrag);
                document.removeEventListener('mouseup', stopDrag);
                document.removeEventListener('touchend', stopDrag);
                
                if (isDragging) {
                    box.lat = parseFloat(el.style.left);
                    box.lng = parseFloat(el.style.top);
                    await fetch(`/api/toolboxes/${box.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(box)
                    });
                }
                setTimeout(() => { isDragging = false; }, 50);
            };

            el.addEventListener('mousedown', startDrag);
            el.addEventListener('touchstart', startDrag, {passive: false});
        }

        // 4. 새 툴박스 추가
        function addNewBox() {
            const newId = 'TB-' + Date.now();
            const newBox = {
                id: newId, name: '새 툴박스', lat: window.innerWidth / 2, lng: 200, 
                color: '#3498db', manager_main: '', manager_sub: '', materials: [], warning: '', photos: [], is_locked: false
            };
            toolboxes.push(newBox);
            renderMap();
            openPopup(newId);
        }

        // 5. 팝업창 열기/닫기
        function openPopup(id) {
            currentBoxId = id;
            const box = toolboxes.find(b => b.id === id);
            if(!box) return;

            document.getElementById('p-name').value = box.name;
            document.getElementById('p-manager-main').value = box.manager_main;
            document.getElementById('p-manager-sub').value = box.manager_sub;
            document.getElementById('p-warning').value = box.warning;
            document.getElementById('p-color').value = box.color || '#3498db';
            
            const photoArea = document.getElementById('p-photo-area');
            photoArea.innerHTML = '';
            box.photos.forEach(p => {
                // 사진 클릭 시 모달창(확대) 띄우는 onclick 이벤트 추가
                photoArea.innerHTML += `<img src="${p}" class="photo-thumb" onclick="openModal('${p}')">`;
            });

            document.getElementById('popup').style.display = 'block';
        }

        function closePopup() {
            document.getElementById('popup').style.display = 'none';
            currentBoxId = null;
        }

        // 6. 데이터 저장
        async function saveToolbox() {
            const box = toolboxes.find(b => b.id === currentBoxId);
            box.name = document.getElementById('p-name').value;
            box.manager_main = document.getElementById('p-manager-main').value;
            box.manager_sub = document.getElementById('p-manager-sub').value;
            box.warning = document.getElementById('p-warning').value;
            box.color = document.getElementById('p-color').value;

            const isNew = box.name === '새 툴박스';
            const method = isNew ? 'POST' : 'PUT';
            const url = isNew ? '/api/toolboxes' : `/api/toolboxes/${box.id}`;
            
            try {
                // 기존 API 설계에 따라 데이터가 새로 생긴 것이든 업데이트든 PUT/POST 유연하게 처리
                await fetch(`/api/toolboxes/${box.id}`, {
                    method: 'PUT', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(box)
                });
                alert('데이터가 안전하게 저장되었습니다.');
                closePopup();
                loadData();
            } catch (e) {
                alert('저장 실패: 네트워크 상태를 확인해주세요.');
            }
        }

        // 7. 삭제
        async function deleteToolbox() {
            if(!confirm('정말 이 툴박스를 삭제하시겠습니까?')) return;
            try {
                await fetch(`/api/toolboxes/${currentBoxId}`, { method: 'DELETE' });
                closePopup();
                loadData();
            } catch (e) {
                alert('삭제 실패');
            }
        }

        // 8. 사진 업로드 (Base64 변환 후 DB 전송)
        function uploadPhoto() {
            const input = document.getElementById('p-photo-input');
            if (input.files.length === 0) {
                alert('사진을 먼저 선택해주세요.'); return;
            }
            
            const file = input.files[0];
            const reader = new FileReader();
            
            reader.onload = async function(e) {
                const base64Data = e.target.result;
                try {
                    const res = await fetch(`/api/toolboxes/${currentBoxId}/photos`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image_data: base64Data })
                    });
                    if(res.ok) {
                        alert('사진 등록 완료!');
                        loadData(); 
                        setTimeout(() => openPopup(currentBoxId), 500); // 팝업 재오픈하여 갱신
                    } else {
                        alert('사진 등록 실패');
                    }
                } catch(err) {
                    alert('서버 통신 실패');
                }
            };
            reader.readAsDataURL(file);
        }

        // 9. 잠금 및 검색
        function toggleLock() {
            isLocked = !isLocked;
            const btn = document.getElementById('lock-btn');
            if(isLocked) {
                btn.innerText = '이동 잠금 ON';
                btn.className = 'btn btn-lock';
            } else {
                btn.innerText = '이동 잠금 OFF';
                btn.className = 'btn btn-lock unlocked';
            }
        }

        function searchBox() {
            const text = document.getElementById('search-box').value.toLowerCase();
            document.querySelectorAll('.marker').forEach(marker => {
                const name = marker.querySelector('.marker-label').innerText.toLowerCase();
                marker.style.display = name.includes(text) ? 'block' : 'none';
            });
        }

        // 10. 사진 확대 모달 함수 (라이트박스)
        function openModal(imgSrc) {
            document.getElementById('modalImage').src = imgSrc;
            document.getElementById('imageModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        // 초기 실행
        window.onload = loadData;
    </script>
</body>
</html>
